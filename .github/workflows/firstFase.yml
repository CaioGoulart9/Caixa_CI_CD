name: First fase

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  JAVA_VERSION: '21'
  TERRAFORM_VERSION: '1.9.8'
  SONAR_ORGANIZATION: caiogoulart9
  SONAR_PROJECT_KEY: Caixa_CI_CD
  SONAR_PROJECT_NAME: Caixa_CI_CD

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    environment: Caixa_Token

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Ensure SonarCloud project exists
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ env.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ env.SONAR_PROJECT_KEY }}
          SONAR_PROJECT_NAME: ${{ env.SONAR_PROJECT_NAME }}
        run: bash .github/scripts/ensure-sonar-project.sh

      - name: Build, test and generate coverage
        run: chmod +x mvnw && ./mvnw clean verify --batch-mode

      - name: Verify JaCoCo report
        run: |
          test -f target/site/jacoco/jacoco.xml
          echo "JaCoCo report gerado com sucesso"

      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          chmod +x mvnw &&
          ./mvnw sonar:sonar --batch-mode
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: Caixa-iac-jar
          path: target/*.jar
          retention-days: 7

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FASE-01/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -backend=false #Deve ser true se tiver conectado na AWS, default é True

      - name: Validate Terraform configuration
        run: terraform validate